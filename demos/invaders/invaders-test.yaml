# Deterministic smoke test for the Invaders demo: title → game → held-key
# steering, frame-stepped via the poke/until protocol the demo prescribes.
# Run with: pet test run demos/invaders/invaders-test.yaml
name: invaders-smoke
machine: pet4032
program: invaders.s
timeout: 45
steps:
  - wait:  { text: "PRESS ANY KEY" }
  - key:   " "
  - wait:  { text: "LIVES 3" }
  - until: { ref: tick }                    # anchor: stopped at the loop top
  - poke:  { addr: "$97", values: [68] }    # hold D ('D' = PETSCII $44)...
  - until: { ref: tick, count: 3 }          # ...for one 3-tick move period
  - poke:  { addr: "$97", values: [68] }
  - until: { ref: tick, count: 3 }
  - assert: { mem: "@23,20", equals: [108, 98, 123] }  # base slid 18 -> 20
  - assert: { mem: basex, equals: 20 }
